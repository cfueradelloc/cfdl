    <style>
        /* index is a bespoke split layout — it consumes base.css tokens/fonts/reset
           but keeps its own grid, nav, and footer chrome. */
        body {
            display: grid;
            grid-template-rows: 1fr auto;
        }

        /* ── Main ──────────────────────────────────────────────────────────── */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 56px);
        }

        /* ── Left: branding ────────────────────────────────────────────────── */
        .brand-col {
            background: var(--text);
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand-top {
            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--band-muted);
            line-height: 1.8;
        }

        .brand-name {
            font-family: 'MinionPro', serif;
            font-size: clamp(64px, 11vw, 160px);
            line-height: 0.9;
            font-weight: normal;
            font-style: italic;
            color: var(--bg);
            align-self: flex-end;
        }

        /* ── Right: nav sections ───────────────────────────────────────────── */
        .nav-col {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            border-bottom: 1px solid var(--border);
            border-left: 3px solid transparent;
            text-decoration: none;
            color: var(--text);
            transition: background var(--ease), border-color var(--ease);
        }

        .nav-item:last-child { border-bottom: none; }

        .nav-item:hover {
            background: #e8b8c8;
            border-left-color: var(--accent);
        }

        .nav-item:hover .nav-arrow {
            transform: translateX(6px);
            color: var(--accent);
        }

        .nav-item-label {
            font-family: 'MinionPro', serif;
            font-size: clamp(28px, 4vw, 52px);
            font-weight: normal;
            font-style: italic;
        }

        .nav-arrow {
            font-size: 20px;
            color: var(--accent);
            opacity: 0.55;
            transition: transform var(--ease), color var(--ease), opacity var(--ease);
        }

        .nav-item:hover .nav-arrow { opacity: 1; }

        /* ── Footer (bespoke, fixed-height row) ────────────────────────────── */
        footer {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            background: var(--text);
            border-top: 1px solid var(--band-rule);
        }

        footer p, footer a {
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--band-muted);
            text-decoration: none;
            transition: color var(--ease);
        }

        footer a:hover { color: var(--bg); }

        /* ── Responsive ────────────────────────────────────────────────────── */
        @media (max-width: 700px) {
            main { grid-template-columns: 1fr; min-height: auto; }
            .brand-col { border-bottom: 1px solid var(--band-rule); padding: 32px 24px; min-height: 40vh; }
            .nav-item { padding: 0 24px; }
            /* hold the footer to a single row — override base.css's column rule */
            footer { padding: 0 24px; flex-direction: row; gap: 0; text-align: left; }
        }
    </style>
</head>
