    <style>
        /* ── Shuffle control — icon, anchored in the header band ───────────── */
        header { position: relative; }

        .shuffle-btn {
            position: absolute;
            top: 64px;
            right: 64px;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--band-rule);
            border-radius: 50%;
            color: var(--band-muted);
            cursor: pointer;
            transition: color var(--ease), background var(--ease),
                        border-color var(--ease), transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .shuffle-btn svg { width: 18px; height: 18px; display: block; }

        .shuffle-btn:hover,
        .shuffle-btn:focus-visible {
            color: var(--band-bg);
            background: var(--accent);
            border-color: var(--accent);
            outline: none;
        }

        @media (max-width: 700px) {
            .shuffle-btn { top: 40px; right: 24px; width: 38px; height: 38px; }
        }

        /* ── Stochastic collage — large, generous tiles ────────────────────── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 320px;
            grid-auto-flow: dense;
            gap: 14px;
            padding: 32px;
            transition: opacity 0.4s ease;
        }

        .gallery figure {
            position: relative;
            margin: 0;
            overflow: hidden;
            grid-column: span 1;
            grid-row: span 1;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        .gallery figure.tall { grid-row: span 2; }
        .gallery figure.wide { grid-column: span 2; }
        .gallery figure.big  { grid-column: span 2; grid-row: span 2; }

        .gallery figure img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery figure figcaption {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 28px 14px 12px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.62));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery figure:hover figcaption,
        .gallery figure:focus-within figcaption { opacity: 1; }

        @media (hover: none) {
            .gallery figure figcaption { opacity: 1; }
        }

        @media (max-width: 900px) {
            .gallery { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 260px; gap: 12px; padding: 20px; }
        }

        @media (max-width: 520px) {
            .gallery { grid-auto-rows: 200px; gap: 10px; padding: 14px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .gallery, .gallery figure, .gallery figure figcaption { transition: none; }
        }

        /* ── No-JS fallback (simple masonry of all images) ─────────────────── */
        .gallery-static { columns: 3; column-gap: 14px; padding: 32px; }
        .gallery-static figure { break-inside: avoid; margin: 0 0 14px; }
        .gallery-static figure img { width: 100%; height: auto; display: block; }
        .gallery-static figcaption {
            font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--muted); padding: 6px 2px 0;
        }
        @media (max-width: 900px) { .gallery-static { columns: 2; } }
        @media (max-width: 520px) { .gallery-static { columns: 1; padding: 16px; } }
    </style>

    var gallery = document.getElementById("gallery");
    var shuffleBtn = document.getElementById("shuffle");
    if (!gallery) return;

    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var seen = {};            // srcs surfaced since the last pool reset (biases toward unseen)
    var paused = false;       // pause auto-rotate on hover

    function shuffle(a) {
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    // At least 12 images shown; bigger tiles → fewer columns.
    function layout() {
        if (window.innerWidth <= 900) return { cols: 2, k: 12 };
        return { cols: 3, k: 15 };
    }

    // Pick k images, preferring ones not yet seen so repeated reshuffles cycle through all.
    function pickSet(k) {
        var pool = IMAGES.filter(function (im) { return !seen[im.src]; });
        if (pool.length < k) { seen = {}; pool = IMAGES.slice(); }
        shuffle(pool);
        var chosen = pool.slice(0, k);
        chosen.forEach(function (im) { seen[im.src] = true; });
        return chosen;
    }

    // Pick one image not currently displayed (and ideally not recently seen).
    function pickOne(exclude) {
        var pool = IMAGES.filter(function (im) { return exclude.indexOf(im.src) === -1 && !seen[im.src]; });
        if (!pool.length) pool = IMAGES.filter(function (im) { return exclude.indexOf(im.src) === -1; });
        if (!pool.length) return null;
        var im = pool[Math.floor(Math.random() * pool.length)];
        seen[im.src] = true;
        return im;
    }

    function sizeClass(im, cols, bigOK) {
        var portrait = im.h > im.w * 1.15;
        var landscape = im.w > im.h * 1.15;
        var r = Math.random();
        if (cols >= 3) {
            if (portrait)  return r < 0.5 ? "tall" : "";
            if (landscape) return (bigOK && r < 0.18) ? "big" : (r < 0.5 ? "wide" : "");
            return (bigOK && r < 0.22) ? "big" : "";
        }
        // 2 columns
        if (portrait)  return r < 0.42 ? "tall" : "";
        if (landscape) return r < 0.22 ? "wide" : "";
        return "";
    }

    function makeFigure(im, cls) {
        var fig = document.createElement("figure");
        if (cls) fig.className = cls;
        fig.dataset.src = im.src;
        var img = document.createElement("img");
        img.src = im.src; img.alt = im.alt;
        img.width = im.w; img.height = im.h;
        img.loading = "lazy"; img.decoding = "async";
        var cap = document.createElement("figcaption");
        cap.textContent = im.cap;
        fig.appendChild(img);
        fig.appendChild(cap);
        return fig;
    }

    function render(list) {
        var cols = layout().cols;
        var bigLeft = 2; // cap oversized tiles per render
        var frag = document.createDocumentFragment();
        list.forEach(function (im) {
            var cls = sizeClass(im, cols, bigLeft > 0);
            if (cls === "big") bigLeft--;
            frag.appendChild(makeFigure(im, cls));
        });
        gallery.innerHTML = "";
        gallery.appendChild(frag);
    }

    function currentSrcs() {
        return Array.prototype.map.call(gallery.children, function (f) { return f.dataset.src; });
    }

    // «barajar» — full fresh set with a cross-fade.
    function reshuffle() {
        var k = layout().k;
        if (reduce) { render(pickSet(k)); return; }
        gallery.style.opacity = "0";
        window.setTimeout(function () {
            render(pickSet(k));
            gallery.style.opacity = "1";
        }, 400);
    }

    // Auto-rotate — swap a single tile in place with a slow fade.
    function swapOne() {
        if (reduce || paused || document.hidden) return;
        var figs = gallery.children;
        if (!figs.length) return;
        var slot = figs[Math.floor(Math.random() * figs.length)];
        var im = pickOne(currentSrcs());
        if (!im) return;
        slot.style.opacity = "0";
        window.setTimeout(function () {
            var img = slot.querySelector("img");
            var cap = slot.querySelector("figcaption");
            img.src = im.src; img.alt = im.alt; img.width = im.w; img.height = im.h;
            cap.textContent = im.cap;
            slot.dataset.src = im.src;
            window.requestAnimationFrame(function () { slot.style.opacity = "1"; });
        }, 850);
    }

    // Init
    render(pickSet(layout().k));

    if (shuffleBtn) {
        shuffleBtn.hidden = false;
        var spin = 0;
        shuffleBtn.addEventListener("click", function () {
            spin += 1;
            shuffleBtn.style.transform = "rotate(" + (spin * 180) + "deg)";
            reshuffle();
        });
    }

    gallery.addEventListener("mouseenter", function () { paused = true; });
    gallery.addEventListener("mouseleave", function () { paused = false; });

    if (!reduce) window.setInterval(swapOne, 6000);

    // Re-render when the breakpoint (column count) changes.
    var lastCols = layout().cols, t;
    window.addEventListener("resize", function () {
        window.clearTimeout(t);
        t = window.setTimeout(function () {
            var c = layout().cols;
            if (c !== lastCols) { lastCols = c; render(pickSet(layout().k)); }
        }, 200);
    });
})();
</script>

</body>
</html>
