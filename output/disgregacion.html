<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ante la síntesis, la disgregación — C.F.D.L.</title>
    <link rel="icon" type="image/png" href="../skills/references/logo/CFDL_favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        @font-face {
            font-family: 'FuturaStd';
            src: url('../skills/references/typography/FuturaStd-Book.otf') format('opentype');
        }
        @font-face {
            font-family: 'MinionPro';
            src: url('../skills/references/typography/MinionPro-Regular.otf') format('opentype');
        }

        :root {
            --bg:      #f8ccce;
            --surface: #bbabd5;
            --text:    #332f8a;
            --muted:   #857c75;
            --border:  #c8b8d8;
            --accent:  #fde700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'FuturaStd', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 24px;
            gap: 24px;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 32px 24px;
            border-radius: 4px;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-family: 'MinionPro', serif;
            font-size: 20px;
            font-weight: normal;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.25;
        }

        .cfdl-tag {
            font-size: 10px;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .sidebar .subtitle {
            color: var(--muted);
            font-size: 11px;
            margin-bottom: 36px;
            line-height: 1.6;
            font-style: italic;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .slider-container { display: flex; align-items: center; gap: 10px; }

        .slider-container input[type="range"] {
            flex: 1;
            height: 1px;
            background: var(--border);
            border-radius: 1px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: var(--muted);
            min-width: 24px;
            text-align: right;
        }

        .palette-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

        .palette-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 8px;
            font-family: 'FuturaStd', sans-serif;
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .palette-btn:hover { background: var(--bg); }
        .palette-btn.active { border-color: var(--text); background: var(--text); color: var(--bg); }

        .palette-dots { display: flex; gap: 3px; }
        .palette-dots span { width: 8px; height: 8px; border-radius: 50%; }

        /* Phase indicator */
        .phase-indicator {
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .phase-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            animation: pdot 2.5s ease-in-out infinite;
        }
        @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .button {
            background: var(--text);
            color: var(--surface);
            border: none;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            width: 100%;
            font-family: 'FuturaStd', sans-serif;
        }
        .button:hover { background: #28247a; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.outline {
            background: transparent; color: var(--text);
            border: 1px solid var(--border);
        }
        .button.outline:hover { background: var(--bg); transform: none; }

        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0a0a09;
        }

        #canvas-container canvas { display: block; }

        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <div class="cfdl-tag">C.F.D.L.</div>
        <h1>Ante la síntesis,<br>la disgregación</h1>
        <p class="subtitle">
            "Y ante la síntesis,<br>la disgregación."
        </p>

        <div class="phase-indicator">
            <span class="phase-dot"></span>
            <span id="phaseLabel">convergiendo</span>
        </div>

        <div class="control-section">
            <h3>Parámetros</h3>

            <div class="control-group">
                <label>Fragmentos</label>
                <div class="slider-container">
                    <input type="range" id="nFragsSlider" min="3" max="16" step="1" value="8"
                        oninput="setNFrags(+this.value)">
                    <span class="value-display" id="nFragsVal">8</span>
                </div>
            </div>

            <div class="control-group">
                <label>Velocidad</label>
                <div class="slider-container">
                    <input type="range" id="speedSlider" min="0.3" max="2.5" step="0.1" value="1.0"
                        oninput="params.speed=+this.value; document.getElementById('speedVal').textContent=this.value.toFixed(1)">
                    <span class="value-display" id="speedVal">1.0</span>
                </div>
            </div>

            <div class="control-group">
                <label>Partículas</label>
                <div class="slider-container">
                    <input type="range" id="densitySlider" min="1000" max="9000" step="500" value="5000"
                        oninput="setDensity(+this.value)">
                    <span class="value-display" id="densityVal">5k</span>
                </div>
            </div>
        </div>

        <div class="control-section">
            <h3>Paleta</h3>
            <div class="palette-grid" id="paletteGrid"></div>
        </div>

        <div class="control-section">
            <h3>Acciones</h3>
            <div class="button-row">
                <button class="button" onclick="resetPiece()">Reiniciar</button>
                <button class="button outline" onclick="doSave()">Guardar PNG</button>
            </div>
        </div>
    </aside>

    <main class="canvas-area">
        <div id="canvas-container">
            <div id="sketch"></div>
        </div>
    </main>
</div>

<script>
// ─── FONTS ─────────────────────────────────────────────────────────────────
let fontsReady = false;
Promise.all([
    new FontFace('FuturaStd', 'url(../skills/references/typography/FuturaStd-Book.otf)').load(),
    new FontFace('MinionPro',  'url(../skills/references/typography/MinionPro-Regular.otf)').load(),
]).then(fs => { fs.forEach(f => document.fonts.add(f)); fontsReady = true; })
  .catch(() => { fontsReady = true; });
setTimeout(() => { fontsReady = true; }, 5000);

// ─── HELPERS ───────────────────────────────────────────────────────────────
const lerpV   = (a, b, t) => a + (b - a) * t;
const easeOut = (t, p=2) => 1 - Math.pow(1 - t, p);
const easeIn  = (t, p=2) => Math.pow(t, p);
const smoothstep = t => t * t * (3 - 2 * t);

// ─── PALETTES ──────────────────────────────────────────────────────────────
// frags: colors assigned to fragment clouds (warm + cold mix)
// crack: color for fracture lines
// bg:    canvas background
const PALETTES = {
    nocturno: {
        name: 'Nocturno', bg: [12, 10, 35],
        crack: [253, 231, 0],
        dots: ['#332f8a','#504b9b','#8c82c3','#fde700'],
        frags: [
            [80,  75,  155], [140, 130, 195], [253, 231, 0  ],
            [51,  47,  138], [220, 210, 235], [253, 242, 100],
            [200, 185, 0  ], [100, 90,  0  ], [80,  75,  155],
            [140, 130, 195], [253, 231, 0  ], [51,  47,  138],
            [220, 210, 235], [253, 242, 100], [200, 185, 0  ],
            [100, 90,  0  ],
        ],
    },
    salvia: {
        name: 'Salvia', bg: [20, 8, 25],
        crack: [253, 242, 100],
        dots: ['#332f8a','#8c82c3','#dcd5ef','#fdf264'],
        frags: [
            [140, 130, 195], [220, 210, 235], [253, 242, 100],
            [51,  47,  138], [80,  75,  155], [248, 204, 206],
            [253, 231, 0  ], [200, 185, 0  ], [140, 130, 195],
            [220, 210, 235], [253, 242, 100], [51,  47,  138],
            [80,  75,  155], [248, 204, 206], [253, 231, 0  ],
            [200, 185, 0  ],
        ],
    },
    calida: {
        name: 'Cálida', bg: [30, 24, 0],
        crack: [248, 204, 206],
        dots: ['#64590c','#c8b900','#fde700','#f8ccce'],
        frags: [
            [100, 90,  0  ], [200, 185, 0  ], [253, 231, 0  ],
            [253, 242, 100], [248, 204, 206], [80,  75,  155],
            [140, 130, 195], [51,  47,  138], [100, 90,  0  ],
            [200, 185, 0  ], [253, 231, 0  ], [253, 242, 100],
            [248, 204, 206], [80,  75,  155], [140, 130, 195],
            [51,  47,  138],
        ],
    },
    fria: {
        name: 'Fría', bg: [8, 6, 30],
        crack: [220, 210, 235],
        dots: ['#332f8a','#504b9b','#bbabd5','#dcd5ef'],
        frags: [
            [51,  47,  138], [80,  75,  155], [140, 130, 195],
            [187, 171, 213], [220, 210, 235], [253, 242, 100],
            [200, 185, 0  ], [248, 204, 206], [51,  47,  138],
            [80,  75,  155], [140, 130, 195], [187, 171, 213],
            [220, 210, 235], [253, 242, 100], [200, 185, 0  ],
            [248, 204, 206],
        ],
    },
};

// ─── PHASE SCHEDULE ────────────────────────────────────────────────────────
// Durations in frames. Speed parameter scales the clock.
const PHASE_DEFS = [
    { name: 'CONVERGING', dur: 420, label: 'convergiendo'  },
    { name: 'WHOLE',      dur: 110, label: 'síntesis'       },
    { name: 'CRACKING',   dur: 90,  label: 'fractura'       },
    { name: 'SHATTERING', dur: 260, label: 'disgregación'   },
    { name: 'SCATTERED',  dur: 230, label: 'deriva'         },
];
const CYCLE_LEN = PHASE_DEFS.reduce((s, p) => s + p.dur, 0); // 1110

// cumulative start frames
const PHASE_START = PHASE_DEFS.map((_, i) =>
    PHASE_DEFS.slice(0, i).reduce((s, p) => s + p.dur, 0));

function getPhase(f) {
    const c = ((f % CYCLE_LEN) + CYCLE_LEN) % CYCLE_LEN;
    for (let i = PHASE_DEFS.length - 1; i >= 0; i--) {
        if (c >= PHASE_START[i]) {
            return {
                name:  PHASE_DEFS[i].name,
                label: PHASE_DEFS[i].label,
                t: (c - PHASE_START[i]) / PHASE_DEFS[i].dur,
                c,
            };
        }
    }
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let params = {
    seed:     Math.floor(Math.random() * 999999) + 1,
    palette:  'nocturno',
    nFrags:   8,
    nParticles: 5000,
    speed:    1.0,
};

let fragments  = [];
let particles  = [];
let cracks     = [];
let crackSegs  = []; // all drawn segments [{x1,y1,x2,y2,alpha}]
let clockF     = 0;  // fractional frame counter
let frame      = 0;  // integer frame
let prevPhaseName = '';
let pSketch;

// ─── FRAGMENT CLASS ─────────────────────────────────────────────────────────
class Fragment {
    constructor(idx, nTotal, w, h) {
        // Use LCG seeded by params.seed
        const rng = seededRng(params.seed * 137 + idx * 31);

        // Gather position: clustered near canvas center within a small radius
        const gAngle  = (idx / nTotal) * Math.PI * 2 + rng() * 0.8 - 0.4;
        const gRadius = 40 + rng() * 70;
        this.gp = {
            x: w / 2 + Math.cos(gAngle) * gRadius,
            y: h / 2 + Math.sin(gAngle) * gRadius,
        };

        // Explode position: near edge, roughly in the same angular direction
        const eAngle  = gAngle + (rng() - 0.5) * 0.6;
        const eRadius = Math.min(w, h) * (0.42 + rng() * 0.32);
        this.ep = {
            x: Math.max(20, Math.min(w - 20, w / 2 + Math.cos(eAngle) * eRadius)),
            y: Math.max(20, Math.min(h - 20, h / 2 + Math.sin(eAngle) * eRadius)),
        };

        const pal = PALETTES[params.palette];
        this.color = pal.frags[idx % pal.frags.length];

        // Current visual position (starts at explode pos — CONVERGING brings it back)
        this.x = this.ep.x;
        this.y = this.ep.y;
    }

    updatePos(phaseName, t) {
        let pos;
        switch (phaseName) {
            case 'CONVERGING': {
                const e = easeOut(t, 2.5);
                pos = { x: lerpV(this.ep.x, this.gp.x, e), y: lerpV(this.ep.y, this.gp.y, e) };
                break;
            }
            case 'WHOLE':
            case 'CRACKING':
                pos = { x: this.gp.x, y: this.gp.y };
                break;
            case 'SHATTERING': {
                const e = smoothstep(t);
                pos = { x: lerpV(this.gp.x, this.ep.x, e), y: lerpV(this.gp.y, this.ep.y, e) };
                break;
            }
            case 'SCATTERED':
            default:
                pos = { x: this.ep.x, y: this.ep.y };
                break;
        }
        this.x = pos.x;
        this.y = pos.y;
    }
}

// ─── PARTICLE CLASS ─────────────────────────────────────────────────────────
class Particle {
    constructor(fragIdx, w, h) {
        this.fragIdx = fragIdx;
        const frag = fragments[fragIdx];
        // Start near the fragment's explode position (before convergence)
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 180;
        this.x = frag.ep.x + Math.cos(a) * r;
        this.y = frag.ep.y + Math.sin(a) * r;
        this.vx = 0; this.vy = 0;
        this.W = w; this.H = h;
    }

    update(phaseName, t) {
        const frag = fragments[this.fragIdx];
        const dx = frag.x - this.x;
        const dy = frag.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;

        // Attraction toward fragment center — strength and noise vary by phase
        let attract, noise, damp;
        switch (phaseName) {
            case 'CONVERGING': attract = 0.022; noise = 0.28; damp = 0.90; break;
            case 'WHOLE':      attract = 0.012; noise = 0.18; damp = 0.91; break;
            case 'CRACKING':   attract = 0.012; noise = 0.22; damp = 0.90; break;
            case 'SHATTERING': attract = 0.035 + t * 0.02; noise = 0.35 + t * 0.5; damp = 0.88; break;
            case 'SCATTERED':  attract = 0.003; noise = 0.45; damp = 0.93; break;
            default:           attract = 0.02;  noise = 0.3;  damp = 0.90;
        }

        const cap = Math.min(dist, 80);
        this.vx += (dx / dist) * attract * cap;
        this.vy += (dy / dist) * attract * cap;
        this.vx += (Math.random() - 0.5) * 2 * noise;
        this.vy += (Math.random() - 0.5) * 2 * noise;
        this.vx *= damp;
        this.vy *= damp;
        this.x  += this.vx;
        this.y  += this.vy;
    }
}

// ─── CRACK SYSTEM ───────────────────────────────────────────────────────────
// Crack tips grow during CRACKING phase, leaving segments that persist.
class CrackTip {
    constructor(x, y, angle) {
        this.x = x; this.y = y;
        this.angle = angle;
        this.speed = 4 + Math.random() * 5;
        this.len   = 0;
        this.maxLen = 80 + Math.random() * 220;
        this.alive  = true;
        this.branchCount = 0;
        this.maxBranches = 3;
    }

    step(tips, w, h) {
        if (!this.alive) return;
        const px = this.x, py = this.y;
        this.angle += (Math.random() - 0.5) * 0.12;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.len += this.speed;

        crackSegs.push({ x1: px, y1: py, x2: this.x, y2: this.y });

        // Branch
        if (Math.random() < 0.025 && this.len > 25 && this.branchCount < this.maxBranches && tips.length < 28) {
            const ba = this.angle + (Math.random() > 0.5 ? 1 : -1) * (0.6 + Math.random() * 0.8);
            tips.push(new CrackTip(this.x, this.y, ba));
            this.branchCount++;
        }

        if (this.len > this.maxLen ||
            this.x < -10 || this.x > w + 10 ||
            this.y < -10 || this.y > h + 10) {
            this.alive = false;
        }
    }
}

function initCracks(w, h) {
    cracks    = [];
    crackSegs = [];
    const pal  = PALETTES[params.palette];
    const cx = w / 2, cy = h / 2;
    const nSeeds = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < nSeeds; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 90;
        const sx = cx + Math.cos(a) * r;
        const sy = cy + Math.sin(a) * r;
        // Angle biased away from center
        const baseAngle = Math.atan2(sy - cy, sx - cx) + (Math.random() - 0.5) * 1.0;
        cracks.push(new CrackTip(sx, sy, baseAngle));
    }
}

function stepCracks(w, h) {
    // Advance all alive tips
    const alive = cracks.filter(c => c.alive);
    for (const tip of alive) tip.step(cracks, w, h);
}

function drawCracks(p, alpha) {
    if (crackSegs.length === 0 || alpha <= 0) return;
    const [cr, cg, cb] = PALETTES[params.palette].crack;

    // Glow pass
    p.strokeWeight(4);
    p.stroke(cr, cg, cb, alpha * 0.12);
    for (const s of crackSegs) p.line(s.x1, s.y1, s.x2, s.y2);

    // Core pass
    p.strokeWeight(0.9);
    p.stroke(cr, cg, cb, alpha);
    for (const s of crackSegs) p.line(s.x1, s.y1, s.x2, s.y2);
}

// ─── SEEDED RNG ─────────────────────────────────────────────────────────────
function seededRng(seed) {
    let s = seed >>> 0;
    return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967295; };
}

// ─── INIT ───────────────────────────────────────────────────────────────────
function initPiece(w, h) {
    // Fragments
    fragments = [];
    for (let i = 0; i < params.nFrags; i++) {
        fragments.push(new Fragment(i, params.nFrags, w, h));
    }

    // Particles — distributed across all fragments
    particles = [];
    const perFrag = Math.ceil(params.nParticles / params.nFrags);
    for (let fi = 0; fi < params.nFrags; fi++) {
        for (let j = 0; j < perFrag && particles.length < params.nParticles; j++) {
            particles.push(new Particle(fi, w, h));
        }
    }

    cracks    = [];
    crackSegs = [];
    clockF    = 0;
    frame     = 0;
    prevPhaseName = '';
}

// ─── CONTROL HANDLERS ───────────────────────────────────────────────────────
function setNFrags(n) {
    params.nFrags = n;
    document.getElementById('nFragsVal').textContent = n;
    if (pSketch) initPiece(pSketch.width, pSketch.height);
}

function setDensity(n) {
    params.nParticles = n;
    const label = n >= 1000 ? (n / 1000).toFixed(0) + 'k' : n;
    document.getElementById('densityVal').textContent = label;
    if (pSketch) initPiece(pSketch.width, pSketch.height);
}

function setPalette(key) {
    params.palette = key;
    // Update fragment colors
    const pal = PALETTES[key];
    fragments.forEach((f, i) => { f.color = pal.frags[i % pal.frags.length]; });
    // Update buttons
    document.querySelectorAll('#paletteGrid .palette-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.key === key));
}

function resetPiece() { if (pSketch) initPiece(pSketch.width, pSketch.height); }
function doSave()     { if (pSketch) pSketch.saveCanvas('disgregacion', 'png'); }

// ─── BUILD PALETTE GRID ──────────────────────────────────────────────────────
(function() {
    const grid = document.getElementById('paletteGrid');
    Object.entries(PALETTES).forEach(([key, pal]) => {
        const btn = document.createElement('button');
        btn.className = 'palette-btn' + (key === params.palette ? ' active' : '');
        btn.dataset.key = key;
        btn.onclick = () => setPalette(key);
        const dots = pal.dots.map(c => `<span style="background:${c}"></span>`).join('');
        btn.innerHTML = `<div class="palette-dots">${dots}</div>${pal.name}`;
        grid.appendChild(btn);
    });
})();

// ─── P5 SKETCH ──────────────────────────────────────────────────────────────
new p5(function(p) {
    pSketch = p;

    p.setup = function() {
        const availW = window.innerWidth  - 280 - 80;
        const availH = window.innerHeight - 48;
        const sz = Math.max(Math.min(availW, availH, 900), 380);

        const cnv = p.createCanvas(sz, sz);
        cnv.parent('sketch');
        document.getElementById('canvas-container').style.width  = sz + 'px';
        document.getElementById('canvas-container').style.height = sz + 'px';

        p.colorMode(p.RGB, 255, 255, 255, 255);
        initPiece(sz, sz);

        // Start mid-CONVERGING so viewer sees it assembling first
        clockF = 0;
        frame  = 0;
    };

    p.draw = function() {
        if (!fontsReady) { p.background(10); return; }

        // Advance clock by speed
        clockF += params.speed;
        frame   = Math.floor(clockF);

        const ph = getPhase(frame);

        // Detect phase transitions
        if (ph.name !== prevPhaseName) {
            if (ph.name === 'CRACKING') initCracks(p.width, p.height);
            document.getElementById('phaseLabel').textContent = ph.label;
            prevPhaseName = ph.name;
        }

        // Advance cracks during CRACKING
        if (ph.name === 'CRACKING') {
            const steps = Math.ceil(params.speed);
            for (let s = 0; s < steps; s++) stepCracks(p.width, p.height);
        }

        // ── Background (semi-transparent for trail) ──────────────────────────
        const bg = PALETTES[params.palette].bg;
        let bgAlpha;
        switch (ph.name) {
            case 'CONVERGING': bgAlpha = 38; break;
            case 'WHOLE':      bgAlpha = 55; break;
            case 'CRACKING':   bgAlpha = 45; break;
            case 'SHATTERING': bgAlpha = 16 + (1 - ph.t) * 14; break;
            case 'SCATTERED':  bgAlpha = 9;  break;
            default:           bgAlpha = 35;
        }
        p.noStroke();
        p.fill(bg[0], bg[1], bg[2], bgAlpha);
        p.rect(0, 0, p.width, p.height);

        // ── Update fragment positions ─────────────────────────────────────────
        for (const frag of fragments) frag.updatePos(ph.name, ph.t);

        // ── Draw bonds during WHOLE / CRACKING ───────────────────────────────
        if (ph.name === 'WHOLE' || ph.name === 'CRACKING') {
            const bondAlpha = ph.name === 'CRACKING' ? (1 - ph.t) * 28 : 28;
            p.strokeWeight(0.5);
            for (let i = 0; i < fragments.length; i++) {
                for (let j = i + 1; j < fragments.length; j++) {
                    const fi = fragments[i], fj = fragments[j];
                    const d = Math.hypot(fi.x - fj.x, fi.y - fj.y);
                    if (d < p.width * 0.38) {
                        const [cr, cg, cb] = PALETTES[params.palette].crack;
                        p.stroke(cr, cg, cb, bondAlpha);
                        p.line(fi.x, fi.y, fj.x, fj.y);
                    }
                }
            }
        }

        // ── Draw particles ───────────────────────────────────────────────────
        p.strokeWeight(1.6);
        p.noFill();

        // Batch by fragment color
        for (let fi = 0; fi < fragments.length; fi++) {
            const [r, g, b] = fragments[fi].color;
            let alpha;
            switch (ph.name) {
                case 'CONVERGING': alpha = 170 + ph.t * 30; break;
                case 'WHOLE':      alpha = 200; break;
                case 'CRACKING':   alpha = 200; break;
                case 'SHATTERING': alpha = 200 - ph.t * 40; break;
                case 'SCATTERED':  alpha = 160 - ph.t * 30; break;
                default:           alpha = 180;
            }
            p.stroke(r, g, b, alpha);
            for (const pt of particles) {
                if (pt.fragIdx !== fi) continue;
                pt.update(ph.name, ph.t);
                p.point(pt.x, pt.y);
            }
        }

        // ── Draw crack lines ─────────────────────────────────────────────────
        const cyc = ((frame % CYCLE_LEN) + CYCLE_LEN) % CYCLE_LEN;
        const crackStart = PHASE_START[2]; // CRACKING start
        const crackEnd   = crackStart + PHASE_DEFS[2].dur;
        const crackFade  = crackEnd + 180; // fade out 180f into SHATTERING

        if (cyc >= crackStart && cyc < crackFade) {
            let crackAlpha;
            if (cyc < crackEnd) {
                crackAlpha = Math.min((cyc - crackStart) / 20, 1) * 210; // ramp in
            } else {
                crackAlpha = (1 - (cyc - crackEnd) / (crackFade - crackEnd)) * 210; // fade out
            }
            p.noFill();
            drawCracks(p, crackAlpha);
        }

        // ── Vignette ─────────────────────────────────────────────────────────
        const vgrd = p.drawingContext.createRadialGradient(
            p.width / 2, p.height / 2, p.width * 0.22,
            p.width / 2, p.height / 2, p.width * 0.80
        );
        vgrd.addColorStop(0, `rgba(${bg[0]},${bg[1]},${bg[2]},0)`);
        vgrd.addColorStop(1, `rgba(${bg[0]},${bg[1]},${bg[2]},0.55)`);
        p.drawingContext.save();
        p.drawingContext.fillStyle = vgrd;
        p.drawingContext.fillRect(0, 0, p.width, p.height);
        p.drawingContext.restore();

        // ── Phase label on canvas ─────────────────────────────────────────────
        if (fontsReady) {
            let labelAlpha = 0;
            let labelText  = '';
            if (ph.name === 'WHOLE') {
                labelAlpha = Math.min(ph.t / 0.25, 1) * 55;
                labelText  = 'síntesis';
            } else if (ph.name === 'CRACKING') {
                labelAlpha = ph.t * 90;
                labelText  = 'disgregación';
            } else if (ph.name === 'SHATTERING') {
                labelAlpha = (1 - ph.t) * 90;
                labelText  = 'disgregación';
            }

            if (labelAlpha > 0) {
                const [cr, cg, cb] = PALETTES[params.palette].crack;
                p.push();
                p.textFont('MinionPro');
                p.textSize(13);
                p.textAlign(p.RIGHT, p.BOTTOM);
                p.noStroke();
                p.fill(cr, cg, cb, labelAlpha);
                p.text(labelText, p.width - 18, p.height - 14);
                p.pop();
            }

            // Watermark
            const [r2, g2, b2] = PALETTES[params.palette].frags[1];
            p.push();
            p.textFont('MinionPro');
            p.textSize(10);
            p.textAlign(p.LEFT, p.BOTTOM);
            p.noStroke();
            p.fill(r2, g2, b2, 50);
            p.text('ante la síntesis, la disgregación', 16, p.height - 14);
            p.pop();
        }
    };
});
</script>
</body>
</html>
