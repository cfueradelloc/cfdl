<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maleza — C.F.D.L.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        @font-face {
            font-family: 'FuturaStd';
            src: url('../skills/references/typography/FuturaStd-Book.otf') format('opentype');
        }
        @font-face {
            font-family: 'MinionPro';
            src: url('../skills/references/typography/MinionPro-Regular.otf') format('opentype');
        }

        :root {
            --bg:      #fafaf8;
            --surface: #ffffff;
            --text:    #0f0f0e;
            --muted:   #6b6b65;
            --border:  #e5e4df;
            --accent:  #ffb923;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'FuturaStd', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 24px;
            gap: 24px;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 32px 24px;
            border-radius: 4px;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-family: 'MinionPro', serif;
            font-size: 22px;
            font-weight: normal;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .cfdl-tag {
            font-size: 10px;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .sidebar .subtitle {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 40px;
            line-height: 1.6;
            font-style: italic;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .seed-input {
            width: 100%;
            background: var(--bg);
            padding: 10px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            text-align: center;
            color: var(--text);
        }

        .seed-input:focus { outline: none; border-color: var(--accent); }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 1px;
            background: var(--border);
            border-radius: 1px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: var(--muted);
            min-width: 48px;
            text-align: right;
        }

        .button {
            background: var(--text);
            color: var(--surface);
            border: none;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
            width: 100%;
            font-family: 'FuturaStd', sans-serif;
        }

        .button:hover { background: #2a2a28; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }

        .button.accent { background: var(--accent); color: var(--text); }
        .button.accent:hover { background: #e6a710; transform: translateY(-1px); }

        .button.outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .button.outline:hover { background: var(--bg); transform: none; }

        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        /* Palette buttons */
        .palette-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .palette-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 8px;
            font-family: 'FuturaStd', sans-serif;
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .palette-btn:hover { background: var(--bg); }
        .palette-btn.active { border-color: var(--text); background: var(--text); color: #fafaf8; }

        .palette-dots {
            display: flex;
            gap: 3px;
        }

        .palette-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Layer toggles */
        .layer-btns { display: flex; gap: 6px; }

        .layer-btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px 4px;
            font-family: 'FuturaStd', sans-serif;
            font-size: 9px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .layer-btn.active {
            border-color: var(--text);
            color: var(--text);
        }

        /* Canvas */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0a0a09;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="sidebar">
        <div class="cfdl-tag">C.F.D.L.</div>
        <h1>Maleza</h1>
        <div class="subtitle">
            "al mirar atrás, encontrar un camino personal lleno de maleza, con el trazo desvanecido, imposible de volver a recorrer."
        </div>

        <!-- Seed -->
        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button outline" onclick="previousSeed()">← Prev</button>
                <button class="button outline" onclick="nextSeed()">Next →</button>
            </div>
            <button class="button accent" onclick="randomSeedAndUpdate()">↻ Random</button>
        </div>

        <!-- Palette -->
        <div class="control-section">
            <h3>Paleta</h3>
            <div class="palette-grid" id="palette-grid"></div>
        </div>

        <!-- Layers -->
        <div class="control-section">
            <h3>Capas</h3>
            <div class="layer-btns">
                <button class="layer-btn active" data-layer="0" onclick="toggleLayer(0)">Sustrato</button>
                <button class="layer-btn active" data-layer="1" onclick="toggleLayer(1)">Corriente</button>
                <button class="layer-btn active" data-layer="2" onclick="toggleLayer(2)">Destellos</button>
            </div>
        </div>

        <!-- Parameters -->
        <div class="control-section">
            <h3>Parámetros</h3>

            <div class="control-group">
                <label>Densidad</label>
                <div class="slider-container">
                    <input type="range" id="density" min="0.3" max="2.0" step="0.1" value="1.0"
                           oninput="updateParam('density', parseFloat(this.value))">
                    <span class="value-display" id="density-value">1.0</span>
                </div>
            </div>

            <div class="control-group">
                <label>Velocidad</label>
                <div class="slider-container">
                    <input type="range" id="speed" min="0.2" max="2.5" step="0.1" value="1.0"
                           oninput="updateParam('speed', parseFloat(this.value))">
                    <span class="value-display" id="speed-value">1.0</span>
                </div>
            </div>

            <div class="control-group">
                <label>Escala campo</label>
                <div class="slider-container">
                    <input type="range" id="noiseScale" min="0.001" max="0.012" step="0.001" value="0.004"
                           oninput="updateParam('noiseScale', parseFloat(this.value))">
                    <span class="value-display" id="noiseScale-value">0.004</span>
                </div>
            </div>

            <div class="control-group">
                <label>Caos</label>
                <div class="slider-container">
                    <input type="range" id="chaos" min="0.0" max="3.0" step="0.1" value="0.8"
                           oninput="updateParam('chaos', parseFloat(this.value))">
                    <span class="value-display" id="chaos-value">0.8</span>
                </div>
            </div>

            <div class="control-group">
                <label>Persistencia traza</label>
                <div class="slider-container">
                    <input type="range" id="decay" min="1" max="20" step="1" value="5"
                           oninput="updateParam('decay', parseInt(this.value))">
                    <span class="value-display" id="decay-value">5</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="control-section">
            <h3>Acciones</h3>
            <div class="button-row" style="margin-bottom:8px">
                <button class="button" onclick="resetParameters()">Reset</button>
                <button class="button outline" onclick="downloadCanvas()">Guardar PNG</button>
            </div>
        </div>
    </div>

    <div class="canvas-area">
        <div id="canvas-container">
            <div class="loading">Generando maleza...</div>
        </div>
    </div>

</div>

<script>
// ─── PALETTE DEFINITIONS ──────────────────────────────────────────────────────
// Each palette defines: bg, cold colors (for corriente cold zones), warm colors
// (for corriente warm zones), sparks (destellos), sustrato, and UI dots.
const PALETTES = {
    nocturno: {
        name: 'Nocturno',
        bg: [10, 10, 9],
        cold:    [[26,46,61],[74,104,128],[125,158,146]],   // medianoche, pizarra, salvia
        warm:    [[255,185,35],[255,210,90]],                // citrina, sol
        sparks:  [[255,185,35],[255,210,90],[255,244,214]],  // citrina, sol, cera
        sustrato:[[26,46,61],[74,104,128]],                  // medianoche, pizarra
        dots:    ['#1a2e3d','#4a6880','#ffb923','#ffd25a'],
    },
    salvia: {
        name: 'Salvia',
        bg: [6, 12, 8],
        cold:    [[26,46,61],[125,158,146],[180,210,200]],   // medianoche, salvia, salvia light
        warm:    [[255,210,90],[255,244,214]],               // sol, cera
        sparks:  [[255,244,214],[255,210,90],[200,230,220]], // cera, sol, salvia glow
        sustrato:[[26,46,61],[125,158,146]],
        dots:    ['#1a2e3d','#7d9e92','#ffd25a','#fff4d6'],
    },
    calida: {
        name: 'Cálida',
        bg: [12, 7, 0],
        cold:    [[107,66,0],[160,90,10]],                   // resina, azafrán dark
        warm:    [[255,185,35],[255,210,90],[255,244,214]],   // citrina, sol, cera
        sparks:  [[255,244,214],[255,220,120],[255,185,35]],  // cera glow, sol light, citrina
        sustrato:[[107,66,0],[192,125,0]],                    // resina, azafrán
        dots:    ['#6b4200','#c07d00','#ffd25a','#fff4d6'],
    },
    fria: {
        name: 'Fría',
        bg: [5, 8, 12],
        cold:    [[26,46,61],[74,104,128],[232,237,240]],    // medianoche, pizarra, niebla
        warm:    [[125,158,146],[170,200,195]],              // salvia, salvia light
        sparks:  [[232,237,240],[200,220,230],[125,158,146]],// niebla glow, cool mist, salvia
        sustrato:[[26,46,61],[74,104,128]],
        dots:    ['#1a2e3d','#4a6880','#e8edf0','#7d9e92'],
    },
};

// ─── PARAMETERS ──────────────────────────────────────────────────────────────
let params = {
    seed:       12345,
    density:    1.0,
    speed:      1.0,
    noiseScale: 0.004,
    chaos:      0.8,
    decay:      5,
    palette:    'nocturno',
};

const DEFAULT_PARAMS = { ...params };

// ─── LAYER STATE ─────────────────────────────────────────────────────────────
let layerVisible = [true, true, true]; // sustrato, corriente, destellos

// Base particle counts at density=1.0
const BASE_COUNTS = [1400, 8000, 2000];
const CYCLE_LENGTH = 1000;
const GRID_RES = 48; // flow field grid resolution (48×48 cells)

// ─── FLOW FIELD GRIDS ────────────────────────────────────────────────────────
// One curl grid per layer (different z-slices → different patterns per species)
let curlGrids  = [[], [], []];
let turbGrid   = [];

// Per-layer blend weights: how much curl vs turbulence drives the motion
const CURL_W = [0.92, 0.72, 0.30]; // sustrato mostly curl; destellos mostly turb
const TURB_W = [0.08, 0.28, 0.70];

// ─── PARTICLES ───────────────────────────────────────────────────────────────
let particles  = [];
let cycleFrame = 0;

// ─── P5 SETUP ────────────────────────────────────────────────────────────────
function setup() {
    const canvas = createCanvas(1200, 1200);
    canvas.parent('canvas-container');
    document.querySelector('.loading').style.display = 'none';
    colorMode(RGB, 255);
    initializeSystem();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function initializeSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);
    particles  = [];
    cycleFrame = 0;

    const bg = PALETTES[params.palette].bg;
    background(bg[0], bg[1], bg[2]);

    precomputeGrids();
    spawnAllParticles();
}

// Precompute curl + turbulence fields as grids — fast array lookup during draw
function precomputeGrids() {
    const s   = params.noiseScale;
    const eps = 0.5;
    const N   = GRID_RES + 1;

    // Three curl grids, one per layer (z-offsets: 0, 1.8, 3.6)
    const zOffsets = [0, 1.8, 3.6];
    for (let L = 0; L < 3; L++) {
        curlGrids[L] = new Array(N);
        const z = zOffsets[L];
        for (let gy = 0; gy < N; gy++) {
            curlGrids[L][gy] = new Array(N);
            for (let gx = 0; gx < N; gx++) {
                const x = (gx / GRID_RES) * width;
                const y = (gy / GRID_RES) * height;
                // Gradient of Perlin → rotate 90° → curl (divergence-free)
                const dNdy = noise(x*s, (y+eps)*s, z) - noise(x*s, (y-eps)*s, z);
                const dNdx = noise((x+eps)*s, y*s, z) - noise((x-eps)*s, y*s, z);
                const scale = TWO_PI * 3.2 / (2 * eps);
                curlGrids[L][gy][gx] = {
                    vx:  dNdy * scale,
                    vy: -dNdx * scale,
                };
            }
        }
    }

    // Single turbulence grid (shared, larger scale, different seed offset)
    turbGrid = new Array(N);
    for (let gy = 0; gy < N; gy++) {
        turbGrid[gy] = new Array(N);
        for (let gx = 0; gx < N; gx++) {
            const x = (gx / GRID_RES) * width;
            const y = (gy / GRID_RES) * height;
            const angle = noise(x * s * 0.28, y * s * 0.28, 20.0) * TWO_PI * 2.0;
            turbGrid[gy][gx] = { vx: cos(angle), vy: sin(angle) };
        }
    }
}

// Bilinear interpolation into a grid
function sampleGrid(grid, x, y) {
    const gxf = constrain((x / width)  * GRID_RES, 0, GRID_RES);
    const gyf = constrain((y / height) * GRID_RES, 0, GRID_RES);
    const ix  = floor(gxf), iy = floor(gyf);
    const fx  = gxf - ix,   fy = gyf - iy;
    const ix1 = min(ix + 1, GRID_RES);
    const iy1 = min(iy + 1, GRID_RES);

    const vx = lerp(
        lerp(grid[iy][ix].vx,  grid[iy][ix1].vx,  fx),
        lerp(grid[iy1][ix].vx, grid[iy1][ix1].vx, fx),
        fy
    );
    const vy = lerp(
        lerp(grid[iy][ix].vy,  grid[iy][ix1].vy,  fx),
        lerp(grid[iy1][ix].vy, grid[iy1][ix1].vy, fx),
        fy
    );
    return { vx, vy };
}

// ─── SPAWN ───────────────────────────────────────────────────────────────────
function spawnAllParticles() {
    const d = params.density;

    // Layer 0 — Sustrato: jittered grid guarantees full-canvas coverage at startup
    const sustratoCount = floor(BASE_COUNTS[0] * d);
    const gsize = ceil(sqrt(sustratoCount));
    const cw = width / gsize, ch = height / gsize;
    for (let i = 0; i < sustratoCount; i++) {
        const col = i % gsize;
        const row = floor(i / gsize) % gsize;
        const x   = (col + random(0.1, 0.9)) * cw;
        const y   = (row + random(0.1, 0.9)) * ch;
        particles.push(new Particle(0, x, y));
    }

    // Layer 1 — Corriente: mixed birth positions (edge + interior + noise-peak)
    const corrienteCount = floor(BASE_COUNTS[1] * d);
    for (let i = 0; i < corrienteCount; i++) {
        particles.push(new Particle(1));
    }

    // Layer 2 — Destellos: scattered interior only
    const destellosCount = floor(BASE_COUNTS[2] * d);
    for (let i = 0; i < destellosCount; i++) {
        particles.push(new Particle(2));
    }
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw() {
    const bg = PALETTES[params.palette].bg;

    // Fading veil — accelerates near end of cycle for a soft dissolve
    let fadeAlpha = params.decay;
    if (cycleFrame > 870) {
        const t = (cycleFrame - 870) / 130; // 0→1 over last 130 frames
        fadeAlpha = params.decay + t * t * (80 - params.decay);
    }

    noStroke();
    fill(bg[0], bg[1], bg[2], fadeAlpha);
    rect(0, 0, width, height);

    // Draw layers
    for (const p of particles) {
        if (!layerVisible[p.layer]) continue;
        p.update();
        p.display();
    }

    cycleFrame++;

    // Cycle end: background clears, seed advances, particles respawn
    if (cycleFrame >= CYCLE_LENGTH) {
        noStroke();
        fill(bg[0], bg[1], bg[2]);
        rect(0, 0, width, height);

        params.seed++;
        randomSeed(params.seed);
        noiseSeed(params.seed);
        document.getElementById('seed-input').value = params.seed;

        precomputeGrids();
        for (const p of particles) { p.reset(); }
        cycleFrame = 0;
    }
}

// ─── PARTICLE CLASS ──────────────────────────────────────────────────────────
class Particle {
    constructor(layer, initX, initY) {
        this.layer  = layer;
        this._initX = initX; // used only on first spawn (sustrato grid placement)
        this._initY = initY;
        this.reset(true);
    }

    reset(firstSpawn = false) {
        if (firstSpawn && this._initX !== undefined) {
            this.x = this._initX;
            this.y = this._initY;
        } else {
            this._placeParticle();
        }
        this.age = floor(random(0, 60)); // stagger birth to avoid synchronized waves
        this._assignColor();
    }

    _placeParticle() {
        if (this.layer === 0) {
            // Sustrato resets scatter across interior
            this.x = random(width);
            this.y = random(height);

        } else if (this.layer === 1) {
            // Corriente: 50% edge, 30% random interior, 20% near noise-peak
            const r = random();
            if (r < 0.50) {
                const edge = floor(random(4));
                if      (edge === 0) { this.x = random(width);  this.y = 0; }
                else if (edge === 1) { this.x = random(width);  this.y = height; }
                else if (edge === 2) { this.x = 0;              this.y = random(height); }
                else                 { this.x = width;          this.y = random(height); }
            } else if (r < 0.80) {
                this.x = random(width);
                this.y = random(height);
            } else {
                // Near a noise peak: pick the best of 6 random candidates
                let bx = random(width), by = random(height);
                let bn = noise(bx * 0.003, by * 0.003, 44.0);
                for (let t = 0; t < 5; t++) {
                    const cx = random(width), cy = random(height);
                    const cn = noise(cx * 0.003, cy * 0.003, 44.0);
                    if (cn > bn) { bx = cx; by = cy; bn = cn; }
                }
                this.x = bx + random(-50, 50);
                this.y = by + random(-50, 50);
            }

        } else {
            // Destellos: fully random interior
            this.x = random(width);
            this.y = random(height);
        }
    }

    _assignColor() {
        const pal = PALETTES[params.palette];

        if (this.layer === 0) {
            // Sustrato: cold structural skeleton
            const c = pal.sustrato[floor(random(pal.sustrato.length))];
            this.r = c[0]; this.g = c[1]; this.b = c[2];
            this.maxAge   = random(500, 1200);
            this.w        = random(1.4, 3.0);
            this.speedMul = 0.20 + random(0.12);
            this.baseAlpha = random(35, 70);

        } else if (this.layer === 1) {
            // Corriente: color picked from warm/cold zone at birth position
            // Zone is determined by a slow large-scale noise field (offset seed)
            const zoneVal = noise(
                this.x * 0.0007, this.y * 0.0007, 77.3 + params.seed * 0.00003
            );
            const colors = zoneVal < 0.48 ? pal.cold : pal.warm;
            const c = colors[floor(random(colors.length))];
            // Add slight per-particle hue jitter
            const jitter = random(-8, 8);
            this.r = constrain(c[0] + jitter, 0, 255);
            this.g = constrain(c[1] + jitter, 0, 255);
            this.b = constrain(c[2] + jitter, 0, 255);
            this.maxAge   = random(150, 520);
            this.w        = random(0.35, 1.2);
            this.speedMul = 0.75 + random(0.45);
            this.baseAlpha = random(40, 85);

        } else {
            // Destellos: warm sparks, brief and bright
            const c = pal.sparks[floor(random(pal.sparks.length))];
            this.r = c[0]; this.g = c[1]; this.b = c[2];
            this.maxAge   = random(35, 130);
            this.w        = random(0.2, 0.65);
            this.speedMul = 2.0 + random(1.2);
            this.baseAlpha = random(120, 220);
        }
    }

    update() {
        const L   = this.layer;
        const spd = params.speed * this.speedMul;

        // Sample precomputed curl and turbulence grids
        const curl = sampleGrid(curlGrids[L], this.x, this.y);
        const turb = sampleGrid(turbGrid,     this.x, this.y);

        // Blend curl (organic) + turbulence (chaos) per layer
        const cw = CURL_W[L];
        const tw = TURB_W[L] * params.chaos;

        this.x += (curl.vx * cw + turb.vx * tw) * spd;
        this.y += (curl.vy * cw + turb.vy * tw) * spd;
        this.age++;

        // Reset when expired or out of bounds
        if (this.age > this.maxAge ||
            this.x < -5 || this.x > width  + 5 ||
            this.y < -5 || this.y > height + 5) {
            this._placeParticle();
            this.age = 0;
            this._assignColor();
        }
    }

    display() {
        const t   = this.age / this.maxAge;
        let alpha;

        if (this.layer === 0) {
            // Sustrato: slow fade-in, sustained, slow fade-out
            const env = t < 0.08 ? t / 0.08
                      : t > 0.88 ? (1 - t) / 0.12
                      : 1.0;
            alpha = this.baseAlpha * env;

        } else if (this.layer === 1) {
            // Corriente: linear life decay with slight breathing
            alpha = (1 - t) * this.baseAlpha + sin(t * PI * 3) * 4;

        } else {
            // Destellos: bell-curve flare — peaks at midlife
            const peak = sin(t * PI);
            alpha = peak * peak * this.baseAlpha; // squared for sharper peak
        }

        if (alpha < 1) return; // skip invisible particles

        stroke(this.r, this.g, this.b, alpha);
        strokeWeight(this.w);
        point(this.x, this.y);
    }
}

// ─── PALETTE UI ──────────────────────────────────────────────────────────────
function buildPaletteUI() {
    const grid = document.getElementById('palette-grid');
    grid.innerHTML = '';
    Object.entries(PALETTES).forEach(([key, pal]) => {
        const btn = document.createElement('button');
        btn.className = 'palette-btn' + (params.palette === key ? ' active' : '');
        btn.dataset.key = key;
        const dotsHTML = pal.dots.map(c =>
            `<span style="background:${c}"></span>`
        ).join('');
        btn.innerHTML = `<div class="palette-dots">${dotsHTML}</div><span>${pal.name}</span>`;
        btn.addEventListener('click', () => setPalette(key));
        grid.appendChild(btn);
    });
}

function setPalette(key) {
    params.palette = key;
    document.querySelectorAll('.palette-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === key);
    });
    initializeSystem();
}

// ─── LAYER TOGGLES ───────────────────────────────────────────────────────────
function toggleLayer(idx) {
    layerVisible[idx] = !layerVisible[idx];
    document.querySelector(`.layer-btn[data-layer="${idx}"]`)
        .classList.toggle('active', layerVisible[idx]);
}

// ─── PARAMETER HANDLERS ──────────────────────────────────────────────────────
function updateParam(name, value) {
    params[name] = value;
    document.getElementById(name + '-value').textContent = value;

    if (name === 'density' || name === 'noiseScale') {
        initializeSystem();
    }
}

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    const val = parseInt(document.getElementById('seed-input').value);
    if (val && val > 0) { params.seed = val; initializeSystem(); }
    else updateSeedDisplay();
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    updateSeedDisplay(); initializeSystem();
}

function nextSeed() {
    params.seed++;
    updateSeedDisplay(); initializeSystem();
}

function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 999999) + 1;
    updateSeedDisplay(); initializeSystem();
}

function resetParameters() {
    params        = { ...DEFAULT_PARAMS };
    layerVisible  = [true, true, true];

    document.querySelectorAll('.layer-btn').forEach(btn => btn.classList.add('active'));

    ['density','speed','noiseScale','chaos','decay'].forEach(id => {
        document.getElementById(id).value = params[id];
        document.getElementById(id + '-value').textContent = params[id];
    });

    updateSeedDisplay();
    buildPaletteUI();
    initializeSystem();
}

function downloadCanvas() {
    saveCanvas('maleza-cfdl-' + params.seed, 'png');
}

// ─── INIT UI ─────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
    buildPaletteUI();
    updateSeedDisplay();
});
</script>
</body>
</html>
