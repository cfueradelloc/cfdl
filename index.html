<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.F.D.L.</title>
    <link rel="icon" type="image/svg+xml" href="skills/references/logo/CFDL_favicon.svg">
    <style>
        @font-face {
            font-family: 'FuturaStd';
            src: url('skills/references/typography/FuturaStd-Book.otf') format('opentype');
        }
        @font-face {
            font-family: 'MinionPro';
            src: url('skills/references/typography/MinionPro-Regular.otf') format('opentype');
        }

        :root {
            --bg:      #f8ccce; /* Candy Pink */
            --text:    #332f8a; /* Sapphire */
            --muted:   #857c75; /* Smoke */
            --border:  #c8b8d8; /* lavender-pink */
            --accent:  #fde700; /* Factory Yellow */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'FuturaStd', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-rows: 1fr auto;
        }

        /* ── Main ────────────────────────────────────────────────────────────── */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 56px);
        }

        /* ── Left: branding ──────────────────────────────────────────────────── */
        .brand-col {
            background: var(--text);
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand-top {
            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #7870b8;
            line-height: 1.8;
        }

        .brand-name {
            font-family: 'MinionPro', serif;
            font-size: clamp(64px, 11vw, 160px);
            line-height: 0.9;
            font-weight: normal;
            font-style: italic;
            color: var(--bg);
            align-self: flex-end;
        }

        /* ── Right: nav sections ─────────────────────────────────────────────── */
        .nav-col {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            border-bottom: 1px solid var(--border);
            border-left: 3px solid transparent;
            text-decoration: none;
            color: var(--text);
            transition: background 0.15s, border-color 0.15s;
        }

        .nav-item:last-child { border-bottom: none; }

        .nav-item:hover {
            background: #e8b8c8;
            border-left-color: var(--accent);
        }

        .nav-item:hover .nav-arrow {
            transform: translateX(6px);
            color: var(--accent);
        }

        .nav-item-label {
            font-family: 'MinionPro', serif;
            font-size: clamp(28px, 4vw, 52px);
            font-weight: normal;
            font-style: italic;
        }

        .nav-arrow {
            font-size: 20px;
            color: var(--accent);
            opacity: 0.55;
            transition: transform 0.15s, color 0.15s, opacity 0.15s;
        }

        .nav-item:hover .nav-arrow { opacity: 1; }

        /* ── Footer ──────────────────────────────────────────────────────────── */
        footer {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            background: var(--text);
            border-top: 1px solid #5552b8;
        }

        footer p, footer a {
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #7870b8;
            text-decoration: none;
            transition: color 0.15s;
        }

        footer a:hover { color: var(--bg); }

        /* ── Responsive ──────────────────────────────────────────────────────── */
        @media (max-width: 700px) {
            main { grid-template-columns: 1fr; min-height: auto; }
            .brand-col { border-bottom: 1px solid #5552b8; padding: 32px 24px; min-height: 40vh; }
            .nav-item { padding: 0 24px; }
            footer { padding: 0 24px; }
        }
    </style>
</head>
<body>

<main>
    <div class="brand-col">
        <div class="brand-top">
            Colectivo Fuera de Lugar<br>
            Col·lectiu Fora de Lloc
        </div>
        <div class="brand-name">C.F.D.L.</div>
    </div>

    <nav class="nav-col">
        <a class="nav-item" href="manifiesto.html">
            <span class="nav-item-label">Manifiesto</span>
            <span class="nav-arrow">→</span>
        </a>
        <a class="nav-item" href="eventos.html">
            <span class="nav-item-label">Eventos</span>
            <span class="nav-arrow">→</span>
        </a>
        <a class="nav-item" href="proyectos.html">
            <span class="nav-item-label">Proyectos</span>
            <span class="nav-arrow">→</span>
        </a>
        <a class="nav-item" href="galeria.html">
            <span class="nav-item-label">Galería</span>
            <span class="nav-arrow">→</span>
        </a>
    </nav>
</main>

<footer>
    <p>Colectivo Fuera de Lugar · Col·lectiu Fora de Lloc</p>
    <p>
        <a href="https://instagram.com/cfueradelloc" target="_blank" rel="noopener">@cfueradelloc</a>
    </p>
</footer>

</body>
</html>
