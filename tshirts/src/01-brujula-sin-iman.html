<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>C.F.D.L. — brújula sin imán</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .design-01 .kicker { margin-bottom: 30px; }
  .design-01 .magnet { margin-bottom: 18px; }            /* the lost needle */
  .design-01 .magnet .dot { width: 16px; height: 16px; }
  .design-01 .hero {
    font-family: var(--serif); font-style: italic;
    font-size: 104px; line-height: 0.96; color: var(--sapphire);
  }
  .design-01 .rule { margin-top: 30px; width: 72px; }
  .design-01 .src {
    font-family: var(--serif); font-style: italic;
    font-size: 22px; color: var(--sapphire); opacity: .72;
    margin-top: 22px; line-height: 1.4;
  }
</style></head>
<body>
<div class="stage">
  <!-- garment silhouette -->
  <svg class="tee" viewBox="0 0 640 600" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <defs>
      <linearGradient id="fold" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"   stop-color="#000" stop-opacity="0.06"/>
        <stop offset="0.16" stop-color="#000" stop-opacity="0"/>
        <stop offset="0.84" stop-color="#000" stop-opacity="0"/>
        <stop offset="1"   stop-color="#000" stop-opacity="0.06"/>
      </linearGradient>
    </defs>
    <path d="M270,60 L225,72 L70,150 L58,252 L168,272 L196,232 L206,542
             Q206,556 220,556 L420,556 Q434,556 434,542 L444,232 L472,272
             L582,252 L570,150 L415,72 L370,60
             C360,84 342,98 320,98 C298,98 280,84 270,60 Z"
          fill="#f1ece0" stroke="#d8cfba" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- collar rib -->
    <path d="M274,64 C284,86 300,96 320,96 C340,96 356,86 366,64"
          fill="none" stroke="#d8cfba" stroke-width="3"/>
    <!-- soft side folds -->
    <path d="M206,542 L196,232 L444,232 L434,542 Q434,556 420,556 L220,556 Q206,556 206,542 Z"
          fill="url(#fold)"/>
  </svg>

  <!-- chest print -->
  <div class="print design-01">
    <div class="kicker">C&nbsp;·&nbsp;F&nbsp;·&nbsp;D&nbsp;·&nbsp;L</div>
    <div class="magnet"><span class="dot"></span></div>
    <div class="hero">brújula<br>sin imán</div>
    <hr class="rule">
    <div class="src">deambular hasta perder<br>de vista lo inmutable</div>
  </div>
</div>
</body></html>
