<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>C.F.D.L. — sello</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .design-03 { width: 600px; }
  .design-03 .mark { width: 250px; height: 250px; margin: 0 auto 46px; display: block; }
  .design-03 .sig1, .design-03 .sig2 {
    font-family: var(--sans); text-transform: uppercase;
    letter-spacing: 0.26em; font-size: 21px; color: var(--sapphire);
    line-height: 1.1; white-space: nowrap;
  }
  .design-03 .middot { color: var(--sapphire); font-size: 22px; margin: 13px 0; line-height: 1; }
</style></head>
<body>
<div class="stage">
  <svg class="tee" viewBox="0 0 640 600" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <defs>
      <linearGradient id="fold" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"   stop-color="#000" stop-opacity="0.06"/>
        <stop offset="0.16" stop-color="#000" stop-opacity="0"/>
        <stop offset="0.84" stop-color="#000" stop-opacity="0"/>
        <stop offset="1"   stop-color="#000" stop-opacity="0.06"/>
      </linearGradient>
    </defs>
    <path d="M270,60 L225,72 L70,150 L58,252 L168,272 L196,232 L206,542
             Q206,556 220,556 L420,556 Q434,556 434,542 L444,232 L472,272
             L582,252 L570,150 L415,72 L370,60
             C360,84 342,98 320,98 C298,98 280,84 270,60 Z"
          fill="#f1ece0" stroke="#d8cfba" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M274,64 C284,86 300,96 320,96 C340,96 356,86 366,64"
          fill="none" stroke="#d8cfba" stroke-width="3"/>
    <path d="M206,542 L196,232 L444,232 L434,542 Q434,556 420,556 L220,556 Q206,556 206,542 Z"
          fill="url(#fold)"/>
  </svg>

  <div class="print design-03">
    <!-- C.F.D.L. mark — three sapphire bars + factory-yellow accent dot
         (rebuilt from docs/assets/logo/CFDL_favicon.svg, no pink ground) -->
    <svg class="mark" viewBox="0 0 32 32" aria-label="C.F.D.L.">
      <rect x="10" y="5"  width="15" height="5"  fill="#332f8a" rx="1"/>
      <rect x="5"  y="5"  width="5"  height="22" fill="#332f8a" rx="1"/>
      <rect x="10" y="22" width="15" height="5"  fill="#332f8a" rx="1"/>
      <circle cx="26" cy="6" r="3" fill="#fde700"/>
    </svg>
    <div class="sig1">Colectivo Fuera de Lugar</div>
    <div class="middot">·</div>
    <div class="sig2">Col·lectiu Fora de Lloc</div>
  </div>
</div>
</body></html>
