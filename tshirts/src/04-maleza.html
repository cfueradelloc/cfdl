    <p class="body">Al mirar atrás, encontrar un camino personal lleno de <span class="m">maleza</span>, con el trazo desvanecido, imposible de volver a recorrer. Al mirar hacia adelante, la misma <span class="m">maleza</span>. No creamos para averiguar lo que somos sino para dejar de ser quien somos.</p>
